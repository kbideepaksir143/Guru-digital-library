<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Admission - Guru Digital Library</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#07111f;color:white;}
nav{width:100%;padding:20px 8%;display:flex;justify-content:space-between;background:rgba(0,0,0,0.4);}
.logo{font-size:30px;font-weight:700;color:#FFD700;}
nav ul{display:flex;list-style:none;gap:30px;}
nav ul li a{text-decoration:none;color:white;}

.hero{padding:80px 8%;text-align:center;}
.hero h1{font-size:50px;color:#FFD700;}

.container{width:90%;max-width:1000px;margin:auto;}

.form-box{background:rgba(255,255,255,0.05);padding:40px;border-radius:20px;}
.form-title{text-align:center;font-size:35px;margin-bottom:30px;color:#FFD700;}

form{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}

.input-box{display:flex;flex-direction:column;}
.input-box label{margin-bottom:8px;color:#FFD700;}

.input-box input,.input-box select,.input-box textarea{
padding:14px;
border-radius:10px;
border:none;
outline:none;
background:#111827;
color:white;
}

.full{grid-column:1/-1;}

.submit-btn{
grid-column:1/-1;
padding:16px;
background:#FFD700;
color:black;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.loader{
display:none;
text-align:center;
margin-top:15px;
}
</style>
</head>

<body>

<nav>
<div class="logo">Guru Digital Library</div>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="#">Admission</a></li>
<li><a href="status.html">Know Status</a></li>
</ul>
</nav>

<section class="hero">
<h1>New Admission</h1>
</section>

<div class="container">

<div class="form-box">
<h2 class="form-title">Admission Form</h2>

<form id="admissionForm">

<div class="input-box">
<label>Student Name</label>
<input type="text" id="name" required>
</div>

<div class="input-box">
<label>Father Name</label>
<input type="text" id="father" required>
</div>

<div class="input-box">
<label>Aadhaar Number</label>
<input type="text" id="aadhar" maxlength="12" required>
</div>

<div class="input-box">
<label>Parent Mobile</label>
<input type="text" id="mobile" maxlength="10" required>
</div>

<div class="input-box">
<label>WhatsApp Number</label>
<input type="text" id="whatsapp" maxlength="10" required>
</div>

<div class="input-box">
<label>Date Of Birth</label>
<input type="date" id="dob" required>
</div>

<div class="input-box">
<label>Admission Date</label>
<input type="date" id="admissionDate" required>
</div>

<div class="input-box">
<label>Seat</label>
<select id="seat">
<option>Seat 1</option>
<option>Seat 2</option>
<option>Seat 3</option>
<option>Seat 4</option>
<option>Seat 5</option>
<option>Seat 6</option>
<option>Seat 7</option>
<option>Seat 8</option>
<option>Seat 9</option>
<option>Seat 10</option>
<option>Seat 11</option>
<option>Seat 12</option>
<option>Seat 13</option>
<option>Seat 14</option>
<option>Seat 15</option>
<option>Seat 16</option>
<option>Seat 17</option>
<option>Seat 18</option>
<option>Seat 19</option>
<option>Seat 20</option>
<option>Seat 21</option>
<option>Seat 22</option>
<option>Seat 23</option>
</select>
</div>

<div class="input-box">
<label>Discount</label>
<input type="number" id="discount" value="0">
</div>

<div class="input-box full">
<label>Address</label>
<textarea id="address"></textarea>
</div>

<button type="submit" class="submit-btn">Submit Admission</button>

</form>

<div class="loader" id="loader">⏳ Processing...</div>

</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby6KPsFrva2S5tlNv_8DGv2NGx2lupfockgF6JGGOipRPXe2tuYhUzb7gSiBh3u9ukv1w/exec";

document.getElementById("admissionForm").addEventListener("submit", function(e){
e.preventDefault();

document.getElementById("loader").style.display = "block";

let data = {
name: document.getElementById("name").value,
father: document.getElementById("father").value,
aadhar: document.getElementById("aadhar").value,
mobile: document.getElementById("mobile").value,
whatsapp: document.getElementById("whatsapp").value,
dob: document.getElementById("dob").value,
admissionDate: document.getElementById("admissionDate").value,
seat: document.getElementById("seat").value,
discount: document.getElementById("discount").value,
address: document.getElementById("address").value
};

fetch(scriptURL, {
method: "POST",
headers: {
  "Content-Type": "application/json"
},
body: JSON.stringify(data)
})
.then(res => res.json())
.then(response => {
document.getElementById("loader").style.display = "none";

alert("✅ Admission Successful!\nUser ID: " + response.userId);

document.getElementById("admissionForm").reset();
})
.catch(err => {
document.getElementById("loader").style.display = "none";
alert("❌ Error: " + err);
});

});

</script>

</body>
</html>
