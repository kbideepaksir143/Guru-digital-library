<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Admission - Guru Digital Library</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* SAME CSS (unchanged) */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#07111f;color:white;overflow-x:hidden;}
nav{width:100%;padding:20px 8%;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);position:sticky;top:0;z-index:1000;border-bottom:1px solid rgba(255,255,255,0.08);}
.logo{font-size:30px;font-weight:700;color:#FFD700;}
nav ul{display:flex;list-style:none;gap:30px;}
nav ul li a{text-decoration:none;color:white;transition:0.3s;}
nav ul li a:hover{color:#FFD700;}
.hero{padding:90px 8% 60px;text-align:center;background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f');background-size:cover;}
.hero h1{font-size:60px;color:#FFD700;margin-bottom:20px;}
.hero p{font-size:20px;color:#ddd;max-width:800px;margin:auto;}
.container{width:90%;max-width:1200px;margin:60px auto;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;margin-bottom:50px;}
.info-card{background:rgba(255,255,255,0.05);padding:30px;border-radius:25px;}
.form-box{background:rgba(255,255,255,0.05);padding:50px;border-radius:30px;}
.form-title{text-align:center;font-size:42px;margin-bottom:40px;color:#FFD700;}
form{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;}
.input-box{display:flex;flex-direction:column;}
.input-box label{margin-bottom:10px;color:#FFD700;}
.input-box input,.input-box select,.input-box textarea{padding:16px;border-radius:15px;background:#111827;color:white;}
.full{grid-column:1/-1;}
.submit-btn{grid-column:1/-1;padding:18px;background:#FFD700;color:black;border:none;border-radius:50px;font-size:20px;cursor:pointer;}
</style>
</head>

<body>

<nav>
<div class="logo">Guru Digital Library</div>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="#">Admission</a></li>
<li><a href="#">Know Status</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<section class="hero">
<h1>New Admission</h1>
<p>Join Guru Digital Library with premium facilities.</p>
</section>

<div class="container">

<div class="form-box">
<h2 class="form-title">Admission Form</h2>

<form id="admissionForm">

<div class="input-box">
<label>Student Name</label>
<input type="text" id="name" required>
</div>

<div class="input-box">
<label>Father Name</label>
<input type="text" id="father" required>
</div>

<div class="input-box">
<label>Aadhaar Number</label>
<input type="text" id="aadhar" required>
</div>

<div class="input-box">
<label>Parent Mobile</label>
<input type="text" id="mobile" required>
</div>

<div class="input-box">
<label>WhatsApp Number</label>
<input type="text" id="whatsapp" required>
</div>

<div class="input-box">
<label>Date Of Birth</label>
<input type="date" id="dob" required>
</div>

<div class="input-box">
<label>Admission Date</label>
<input type="date" id="admissionDate" required>
</div>

<div class="input-box">
<label>Seat</label>
<select id="seat">
<option>Seat 1</option>
<option>Seat 2</option>
<option>Seat 3</option>
<option>Seat 4</option>
<option>Seat 5</option>
<option>Seat 6</option>
<option>Seat 7</option>
<option>Seat 8</option>
<option>Seat 9</option>
<option>Seat 10</option>
<option>Seat 11</option>
<option>Seat 12</option>
<option>Seat 13</option>
<option>Seat 14</option>
<option>Seat 15</option>
<option>Seat 16</option>
<option>Seat 17</option>
<option>Seat 18</option>
<option>Seat 19</option>
<option>Seat 20</option>
<option>Seat 21</option>
<option>Seat 22</option>
<option>Seat 23</option>
</select>
</div>

<div class="input-box">
<label>Discount</label>
<input type="number" id="discount">
</div>

<div class="input-box full">
<label>Address</label>
<textarea id="address"></textarea>
</div>

<button type="submit" class="submit-btn">Submit Admission</button>

</form>
</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycby6KPsFrva2S5tlNv_8DGv2NGx2lupfockgF6JGGOipRPXe2tuYhUzb7gSiBh3u9ukv1w/exec";

document.getElementById("admissionForm").addEventListener("submit", function(e){
e.preventDefault();

let data = {
name: document.getElementById("name").value,
father: document.getElementById("father").value,
aadhar: document.getElementById("aadhar").value,
mobile: document.getElementById("mobile").value,
whatsapp: document.getElementById("whatsapp").value,
dob: document.getElementById("dob").value,
admissionDate: document.getElementById("admissionDate").value,
seat: document.getElementById("seat").value,
discount: document.getElementById("discount").value,
address: document.getElementById("address").value
};

fetch(scriptURL, {
method: "POST",
body: JSON.stringify(data)
})
.then(res => res.json())
.then(response => {
alert("✅ Admission Successful!\nUser ID: " + response.userId);
document.getElementById("admissionForm").reset();
})
.catch(err => {
alert("❌ Error: " + err);
});

});

</script>

</body>
</html>
